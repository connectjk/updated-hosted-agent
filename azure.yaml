name: Updated-Hosted-agent
metadata:
  template: agent-framework-hosted
services:
  Updated-Hosted-agent:
    host: ai.agent
    config:
      name: Updated-Hosted-agent
      description: >
        A Updated customer support agent that can search a knowledge base, create support tickets, track ticket status, and escalate complex issues to human agents when needed. It responds politely, provides 
      agent:
        path: .
        startupCommand: python main.py
        protocols:
          - protocol: responses
            version: 1.0.0
        resources:
          cpu: "0.25"
          memory: 0.5Gi
      deployments:
        - name: gpt-4o
          model:
            name: gpt-4o
            format: OpenAI
            version: "2025-03-01"
          sku:
            name: GlobalStandard
            capacity: 10
