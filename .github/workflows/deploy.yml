name: Deploy Hosted Agent to Foundry
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          path: agent-src

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install azd
        run: curl -fsSL https://aka.ms/install-azd.sh | bash

      - name: Install Foundry agent extension
        run: azd extension install azure.ai.agents --force

      - name: Login to azd
        run: azd auth login --client-id ${{ secrets.AZURE_CLIENT_ID }} --federated-credential-provider github --tenant-id ${{ secrets.AZURE_TENANT_ID }}

      - name: Scaffold project from starter template
        run: |
          mkdir deploy && cd deploy
          azd init -t Azure-Samples/azd-ai-starter-basic --no-prompt --location northcentralus
          azd env set AZURE_SUBSCRIPTION_ID ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Add agent definition and deploy
        run: |
          cd deploy
          mkdir -p src/updated-hosted-agent
          cp ../agent-src/main.py ../agent-src/Dockerfile ../agent-src/requirements.txt src/updated-hosted-agent/
          cp ../agent-src/agent.yaml src/updated-hosted-agent/
          cp ../agent-src/azure.yaml ./azure.yaml
          azd up --no-prompt
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_LOCATION: northcentralus
