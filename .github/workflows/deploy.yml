name: Deploy Hosted Agent to Foundry
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          path: agent-src

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install azd
        run: curl -fsSL https://aka.ms/install-azd.sh | bash

      - name: Login to azd
        run: azd auth login --client-id ${{ secrets.AZURE_CLIENT_ID }} --federated-credential-provider github --tenant-id ${{ secrets.AZURE_TENANT_ID }}

      - name: Scaffold and deploy hosted agent
        run: |
          mkdir deploy && cd deploy
          azd init -t Azure-Samples/azd-ai-starter-basic --no-prompt --location northcentralus
          azd env set AZURE_SUBSCRIPTION_ID ${{ secrets.AZURE_SUBSCRIPTION_ID }}

          # Use azd ai agent init to properly integrate the agent
          azd ai agent init -m ../agent-src/agent.yaml --no-prompt

          # Copy agent source files into the scaffolded src directory
          AGENT_DIR=$(find src -maxdepth 1 -mindepth 1 -type d | head -1)
          if [ -z "$AGENT_DIR" ]; then
            AGENT_DIR="src/updated-hosted-agent"
            mkdir -p "$AGENT_DIR"
          fi
          cp ../agent-src/main.py "$AGENT_DIR/"
          cp ../agent-src/Dockerfile "$AGENT_DIR/"
          cp ../agent-src/requirements.txt "$AGENT_DIR/"

          azd up --no-prompt
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_LOCATION: northcentralus
